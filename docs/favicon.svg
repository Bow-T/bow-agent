<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Neo Brutalism: nền vàng bão hoà, khung đen dày, hình vuông đặc có lỗ vuông giữa.
       Khớp .brand .mk trên landing và theme 'brutal' của web UI.
       Vẽ bằng rect đặc (không stroke) để không bị cắt mép khi scale nhỏ. -->
  <rect width="32" height="32" fill="#0a0a0a"/>
  <rect x="3" y="3" width="26" height="26" fill="#ffcf24"/>
  <rect x="9" y="9" width="14" height="14" fill="#0a0a0a"/>
  <rect x="14" y="14" width="4" height="4" fill="#ffcf24"/>
</svg>
