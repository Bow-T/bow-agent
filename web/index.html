<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbf6e9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0e12" media="(prefers-color-scheme: dark)" />
    <title>Bow · Observatory</title>
    <!-- Favicon Neo Brutalism — khớp landing page (bow-t.github.io/bow-agent) và theme 'brutal'. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230a0a0a'/%3E%3Crect x='3' y='3' width='26' height='26' fill='%23ffcf24'/%3E%3Crect x='9' y='9' width='14' height='14' fill='%230a0a0a'/%3E%3Crect x='14' y='14' width='4' height='4' fill='%23ffcf24'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <script>
      // Đặt theme TRƯỚC khi trang vẽ, tránh nháy màu (FOUC) khi React chưa chạy.
      // Cùng logic với App.tsx: đã lưu → dùng; chưa → OS tối cho 'dark', còn lại 'brutal'.
      (function () {
        try {
          var t = localStorage.getItem('bow-theme');
          if (!t || ['light', 'dark', 'blueprint', 'brutal'].indexOf(t) === -1) {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'brutal';
          }
          document.documentElement.setAttribute('data-theme', t);
          var a = localStorage.getItem('bow-accent');
          if (a && a !== 'brass') document.documentElement.setAttribute('data-accent', a);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'brutal');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
