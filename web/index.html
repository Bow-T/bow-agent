<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbf6e9" />
    <title>Bow · Design Styles</title>
    <!-- Favicon Neo Brutalism — khớp landing page (bow-t.github.io/bow-agent). -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230a0a0a'/%3E%3Crect x='3' y='3' width='26' height='26' fill='%23ffcf24'/%3E%3Crect x='9' y='9' width='14' height='14' fill='%230a0a0a'/%3E%3Crect x='14' y='14' width='4' height='4' fill='%23ffcf24'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@600;700;800;900&family=Lora:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <script>
      // Đặt phong cách + accent TRƯỚC khi trang vẽ, tránh nháy màu (FOUC) khi React chưa chạy.
      // 2 phong cách: 'brutal' (Neo Brutalism, kem) & 'newsprint' (báo giấy editorial). Mặc định brutal.
      (function () {
        try {
          var t = localStorage.getItem('bow-theme');
          if (t !== 'brutal' && t !== 'newsprint') t = 'brutal';
          document.documentElement.setAttribute('data-theme', t);
          var a = localStorage.getItem('bow-accent');
          if (a && a !== 'brass') document.documentElement.setAttribute('data-accent', a);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'brutal');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
